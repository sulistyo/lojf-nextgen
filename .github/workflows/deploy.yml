name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            if [ -x "$HOME/apps/lojf/deploy/deploy.sh" ]; then
              APP_DIR="$HOME/apps/lojf" BRANCH=main bash "$HOME/apps/lojf/deploy/deploy.sh"
            else
              ~/deploy.sh
            fi
